<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kripto Haberler - uzmanmuzaffer</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Günlük kripto haberleri ve analizler - AI tarafından oluşturulmuş">
    <meta property="og:title" content="Kripto Haberler">
    <meta property="og:description" content="Günlük kripto haberleri ve analizler">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 Kripto Haberler</h1>
            <p class="subtitle">Günlük kripto analiz ve haberler</p>
            <p style="color: #999; font-size: 0.95em; margin-top: 15px;">
                🤖 <strong>AI Powered</strong> - Groq AI ile otomatik oluşturulmuş
            </p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="post-count">0</div>
                    <div class="stat-label">Yazı</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="update-time">--:--</div>
                    <div class="stat-label">Son Güncelleme</div>
                </div>
                <div class="stat">
                    <div class="stat-number">📚</div>
                    <div class="stat-label">Okuma Süresi</div>
                </div>
            </div>
        </header>

        <div class="posts-wrapper" id="posts-container">
            <div class="no-posts">
                <div class="no-posts-icon">📝</div>
                <p>Yazılar yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        // İkonlar
        const icons = ['🔐', '💰', '📊', '⚡', '🚀', '💎', '📈', '🎯', '🌟', '💡'];
        
        // Okuma süresi hesapla
        function calculateReadTime(text) {
            const wordsPerMinute = 200;
            const words = text.split(/\s+/).length;
            const minutes = Math.ceil(words / wordsPerMinute);
            return minutes + ' dk';
        }

        // Posts yükle
        fetch('posts.json')
            .then(r => r.json())
            .then(posts => {
                const container = document.getElementById('posts-container');
                
                if (posts.length === 0) {
                    container.innerHTML = `
                        <div class="no-posts">
                            <div class="no-posts-icon">⏳</div>
                            <p>Henüz yazı yok. Yakında geliyor...</p>
                        </div>
                    `;
                    return;
                }

                // İstatistikleri güncelle
                document.getElementById('post-count').textContent = posts.length;
                
                // Son güncelleme zamanı
                if (posts.length > 0) {
                    const lastDate = posts[0].date;
                    document.getElementById('update-time').textContent = 'Bugün';
                }

                container.innerHTML = '';
                
                posts.forEach((post, index) => {
                    const icon = icons[index % icons.length];
                    const cardClass = `alt${(index % 3) + 1}`;
                    const readTime = calculateReadTime(post.content);
                    
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-image ${cardClass}">${icon}</div>
                        <div class="post-content">
                            <div>
                                <div class="post-date">📅 ${post.date}</div>
                                <h2>${post.title}</h2>
                                <div class="post-preview">${post.preview || post.content.substring(0, 150)}...</div>
                            </div>
                            <div class="post-footer">
                                <div class="post-meta">
                                    <span>⏱️ ${readTime}</span>
                                    <span>✍️ AI Oluşturuldu</span>
                                </div>
                                <a href="${post.slug}.html" class="read-btn">Oku →</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(e => {
                console.log('posts.json hatası:', e);
                document.getElementById('posts-container').innerHTML = `
                    <div class="no-posts">
                        <div class="no-posts-icon">⚠️</div>
                        <p>Hata: posts.json yüklenemedi</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
